services:
  - type: web
    name: wishvault-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: PRODUCTION
      - key: PYTHON_VERSION
        value: 3.11.0
